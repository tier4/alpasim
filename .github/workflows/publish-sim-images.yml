name: Publish CARLA/TrafficSim images

on:
  push:
    branches: [tier4-dev, main, master]
    tags:
      - "v*"
    paths:
      - "physics.Dockerfile"
      - "trafficsim.Dockerfile"
      - "src/physics/**"
      - "src/trafficsim/**"
      - "src/grpc/**"
      - ".github/workflows/publish-sim-images.yml"
  pull_request:
    paths:
      - "physics.Dockerfile"
      - "trafficsim.Dockerfile"
      - "src/physics/**"
      - "src/trafficsim/**"
      - "src/grpc/**"
      - ".github/workflows/publish-sim-images.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: physics-carla
            dockerfile: physics.Dockerfile
            suffix: physics-carla
            free_disk: true
          - image: trafficsim
            dockerfile: trafficsim.Dockerfile
            suffix: trafficsim
            free_disk: false
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}-${{ matrix.suffix }}
      PLATFORMS: linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # CARLA server bundle (~7 GB) blows past the default 14 GB of free space
      # on ubuntu-22.04. Free extra disk before building the physics image.
      - name: Free disk space
        if: matrix.free_disk
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/tier4-dev' }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
