name: Publish gRPC slim image

on:
  push:
    branches: [tier4-dev, main, master]
    tags: ["v*"]
    paths:
      - "grpc.Dockerfile"
      - "src/grpc/**"
      - ".github/workflows/publish-grpc-slim.yml"
  pull_request:
    paths:
      - "grpc.Dockerfile"
      - "src/grpc/**"
      - ".github/workflows/publish-grpc-slim.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-grpc-slim

jobs:
  build-and-push:
    name: Build & push (${{ github.event_name == 'pull_request' && 'PR' || 'release' }})
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'tier4-dev') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src/grpc
          file: grpc.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=grpc-slim
          cache-to: type=gha,scope=grpc-slim,mode=max
