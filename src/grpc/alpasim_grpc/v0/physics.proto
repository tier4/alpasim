syntax = "proto3";

package physics;

import "alpasim_grpc/v0/common.proto";

service PhysicsService {
    // Session lifecycle. The physics container hosts the CARLA server and
    // owns its `world.tick()` cadence — start_session/close_session set up
    // and tear down the CARLA client and its synchronous-mode settings.
    rpc start_session (PhysicsSessionRequest) returns (common.SessionRequestStatus);
    rpc close_session (PhysicsSessionCloseRequest) returns (common.SessionRequestStatus);

    rpc ground_intersection (PhysicsGroundIntersectionRequest) returns (PhysicsGroundIntersectionReturn);
    rpc get_version (common.Empty) returns (common.VersionId);
    rpc get_available_scenes (common.Empty) returns (common.AvailableScenesReturn);
}

message PhysicsSessionRequest {
    string session_uuid = 1;
    // Interval between CARLA world.tick() calls, in microseconds. The physics
    // container applies this as CARLA's `fixed_delta_seconds` when it opens
    // its client — alpasim's control loop owns the clock so requested and
    // simulated times stay in lock-step.
    fixed64 tick_interval_us = 2;
}

message PhysicsSessionCloseRequest {
    string session_uuid = 1;
}

message PhysicsGroundIntersectionRequest {
    message PosePair {
        // `now_pose` and `future_pose` are active transforms local->aabb for the
        // bounding-box center at the current and future timestamps. The physics
        // system adjusts `future_pose`; the runtime assumes `now_pose` is already
        // valid (typically copied from the previous call). See CONTRIBUTING.md,
        // "Coordinate Systems".
        common.Pose now_pose = 1;
        common.Pose future_pose = 2;
    }

    message EgoData {
        common.AABB aabb = 1; // TODO: replace with mesh ID?
        // Timestamped ego poses (active transforms local->aabb) to ground-correct.
        // All poses are processed independently with the same algorithm.
        common.Trajectory ego_trajectory_aabb = 3;
    }

    message OtherObject {
        // mostly vehicles but likely we don't want pedestrians to clip into the ground either
        common.AABB aabb = 1;
        PosePair pose_pair = 2;
    }

    // to identify the ground mesh
    string scene_id = 1;

    // start and end of all PosePairs in the message
    fixed64 now_us = 2;
    fixed64 future_us = 3;

    optional EgoData ego_data = 4;
    repeated OtherObject other_objects = 5;

    // When non-zero, the physics server advances the CARLA world clock to this
    // timestamp (via world.tick()) after computing ground correction. Set only
    // on the ego-facing ground_intersection call each control step so the world
    // is ticked exactly once per step. Zero means "do not tick CARLA".
    fixed64 advance_world_to_us = 6;

    // Session UUID that keyed the earlier start_session call. Required when
    // advance_world_to_us is non-zero so the physics server can locate the
    // CARLA client to tick.
    string session_uuid = 7;
}

message PhysicsGroundIntersectionReturn {
    enum Status {
        SUCCESSFUL_UPDATE = 0;
        UNKNOWN = 1;
        INSUFFICIENT_POINTS_FITPLANE = 2;
        HIGH_TRANSLATION = 3;
        HIGH_ROTATION = 4;

    }

    message ReturnPose {
        // Pose represents the active transform local->aabb for the center of
        // the AABB (see CONTRIBUTING.md, "Coordinate Systems").
        common.Pose pose = 1;
        Status status = 2;
    }

    // Ground-corrected ego poses, same order as request ego_trajectory_aabb.
    common.Trajectory ego_trajectory_aabb = 4;
    // Per-pose status for ego_trajectory_aabb, same order.
    repeated Status ego_status = 5;
    repeated ReturnPose other_poses = 2; // return in same order as in request
}
