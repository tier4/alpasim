# @package _global_
# 8-GPU topology: 64 concurrent rollouts. For high-throughput SLURM runs with OSS driver.

defines:
  nre_cache_size: 17  # renderer.n_concurrent_rollouts + 1
  physics_cache_size: 6

eval:
  num_processes: 32

services:
  renderer:
    replicas_per_container: 1
    gpus: [0, 1, 2, 3]

  driver:
    replicas_per_container: 8
    gpus: [4, 5, 6, 7]

  physics:
    replicas_per_container: 4
    gpus: [4, 5, 6, 7]

  controller:
    replicas_per_container: 16
    gpus: null

  trafficsim:
    replicas_per_container: 1
    gpus: [0, 1]

runtime:
  nr_workers: 8
  endpoints:
    # Total capacity per service = nr_gpus x replicas_per_container x n_concurrent_rollouts
    # REND: 4 x 1  x 16 = 64
    # DRIV: 4 x 8  x 2  = 64
    # PHYS: 4 x 4  x 4  = 64
    # CONT: 1 (CPU) x 16 x 4 = 64
    renderer:
      n_concurrent_rollouts: 16
    driver:
      n_concurrent_rollouts: 2
      skip: false
    physics:
      n_concurrent_rollouts: 4
      skip: false
    controller:
      n_concurrent_rollouts: 4
    trafficsim:
      skip: true
