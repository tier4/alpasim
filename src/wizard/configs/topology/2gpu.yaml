# @package _global_
# 2-GPU topology: 12 concurrent rollouts. For multi-GPU workstations.

defines:
  nre_cache_size: 13  # renderer.n_concurrent_rollouts + 1

services:
  renderer:
    replicas_per_container: 1
    gpus: [1]

  driver:
    replicas_per_container: 3
    gpus: [0]

  physics:
    replicas_per_container: 1
    gpus: [0, 1]

  trafficsim:
    replicas_per_container: 1
    gpus: [0, 1]

  controller:
    replicas_per_container: 6
    gpus: null

runtime:
  nr_workers: 4
  endpoints:
    # Total capacity per service = nr_gpus x replicas_per_container x n_concurrent_rollouts
    # REND: 1 x 1 x 12 = 12
    # DRIV: 1 x 3 x 4  = 12
    # PHYS: 2 x 1 x 6  = 12
    # CONT: 1 (CPU) x 6 x 2 = 12
    renderer:
      n_concurrent_rollouts: 12
    driver:
      n_concurrent_rollouts: 4
      skip: false
    physics:
      n_concurrent_rollouts: 6
      skip: false
    controller:
      n_concurrent_rollouts: 2
    trafficsim:
      skip: true
