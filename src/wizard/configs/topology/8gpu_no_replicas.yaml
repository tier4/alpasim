# @package _global_

# Meant for Alpasim development.
# A config for 8 GPU nodes which unlike the ORD default only places 1 endpoint per GPU.
# This is lower perf than the default but easier to analyze for performance.

defines:
  nre_cache_size: 3  # renderer.n_concurrent_rollouts + 1

services:
  renderer:
    gpus: [3, 4, 5, 6, 7]
    replicas_per_container: 1

  driver:
    replicas_per_container: 1
    gpus: [0]

  physics:
    replicas_per_container: 1
    gpus: [1]

  trafficsim:
    replicas_per_container: 1
    gpus: [2]

  controller:
    replicas_per_container: 1
    gpus: null

runtime:
  nr_workers: 1
  endpoints:
    # Total capacity per service = nr_gpus x replicas_per_container x n_concurrent_rollouts
    # REND: 5 x 1 x 2  = 10
    # DRIV: 1 x 1 x 10 = 10
    # PHYS: 1 x 1 x 10 = 10
    # CONT: 1 (CPU) x 1 x 10 = 10
    # TRAF: 1 x 1 x 10 = 10
    renderer:
      n_concurrent_rollouts: 2

    driver:
      n_concurrent_rollouts: 10

    physics:
      n_concurrent_rollouts: 10
      skip: false

    controller:
      n_concurrent_rollouts: 10

    trafficsim:
      n_concurrent_rollouts: 10
      skip: false
