# @package _global_
#
# Enables the CARLA 0.9.16 Server inside the physics container.
# Builds the dedicated `physics.Dockerfile` (extends ${defines.base_image} and
# overlays the CARLA Unreal binary + Vulkan/SDL libs at /opt/carla).
# entrypoint.sh launches CarlaUE4.sh in parallel with physics_server when
# CARLA_ENABLED=true.
services:
  physics:
    image: ${defines.physics_carla_image}
    dockerfile: physics.Dockerfile
    environments:
      - WARP_CACHE_PATH='/mnt/warp'
      - CARLA_ENABLED=true
      - CARLA_PORT=2000
      - CARLA_ROOT=/opt/carla
