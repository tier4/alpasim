# @package _global_
#
# Builds the self-contained `docker/carla/physics.Dockerfile` image with CUDA
# runtime, carla_physics_server, and the CARLA 0.9.16 Unreal binary at
# /opt/carla. Keep the command wrapper here: wizard's docker-compose backend
# overrides image ENTRYPOINT whenever command is set.
services:
  physics:
    image: ${defines.physics_carla_image}
    dockerfile: docker/carla/physics.Dockerfile
    environments:
      - WARP_CACHE_PATH='/mnt/warp'
      - CARLA_PORT=2000
      - CARLA_ROOT=/opt/carla
    command:
      - "bash /opt/entrypoint.sh"
      - "--host=0.0.0.0"
      - "--port={port}"
      - "--artifact-glob=/mnt/nre-data/{sceneset}/**/*.usdz"
      - "--use-ground-mesh=true"
      - "--cache-size=${defines.physics_cache_size}"
      - "--log-level=${wizard.log_level}"
